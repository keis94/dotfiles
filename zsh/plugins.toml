shell = "zsh"

[templates]
defer = "{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}{{ hooks?.post | nl }}"

[plugins.zsh-defer]
github = "romkatv/zsh-defer"

[plugins.zsh-completions]
github = "zsh-users/zsh-completions"

[plugins.ghq-completion]
github = "x-motemen/ghq"
dir = "misc/zsh"
apply = ["fpath"]

[plugins.compinit]
# from https://gist.github.com/ctechols/ca1035271ad134841284
inline = '''
_compinit() {
  local re_initialize=0
  for match in ${ZDOTDIR:-$HOME}/.zcompdump*(.Nmh+24); do
    re_initialize=1
    echo "Re-initializing zsh completions (found stale compdump: $match)"
    break
  done

  autoload -Uz compinit
  if [ "$re_initialize" -eq "1" ]; then
    compinit -d "${ZDOTDIR:-$HOME}/.zcompdump"
    # update the timestamp on compdump file
    compdump
  else
    # omit the check for new functions since we updated today
    compinit -C -d "${ZDOTDIR:-$HOME}/.zcompdump"
  fi
}
_compinit
'''

[plugins.pure]
github = "sindresorhus/pure"
use = ["async.zsh", "pure.zsh"]

[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
apply = ["defer"]

[plugins.fzf-tab]
github = "Aloxaf/fzf-tab"
apply = ["defer"]

# fzf-tab の -ftb-fzf は fzf 起動直前に typeahead を吸うため `dd bs=1G`(1GBバッファ)を毎回実行する。
# WSL ではこの 1GB 確保に ~0.6〜1 秒かかり、候補が複数の補完が毎回停止する。
# typeahead は tty バッファ上限(数KB)までしか来ないので bs を 1M に縮小すれば取りこぼしなく高速化できる。
# プラグイン本体は編集せず、メモリ上の関数定義を書き換える(sheldon 更新後も維持/将来 upstream 修正時は no-op)。
# zsh-defer は登録順に実行されるため、上の fzf-tab がロードされた後にこのパッチが走る。
[plugins.fzf-tab-dd-fix]
inline = "zsh-defer -c 'autoload +X -- -ftb-fzf 2>/dev/null && functions[-ftb-fzf]=${functions[-ftb-fzf]//bs=1G/bs=1M}'"

# Tool environment files that is not managed by mise
[plugins.tool-envs]
inline = '''
zsh-defer -c '[[ -f "$HOME/.local/bin/env" ]] && . "$HOME/.local/bin/env"'
zsh-defer -c '[[ -f "$HOME/.ghcup/env" ]] && . "$HOME/.ghcup/env"'
zsh-defer -c '[[ -f "$HOME/.cargo/env" ]] && . "$HOME/.cargo/env"'
'''

# from https://github.com/elecdeer/dotfiles/blob/main/hanger/plugins/on-demand-completion/on-demand-completion.plugin.zsh
[plugins.on-demand-completion]
local = "~/.local/share/sheldon/plugins/on-demand-completion"

# Command completion
[plugins.mise-completion]
inline = 'on_demand_completion "mise" "mise completion zsh"'

[plugins.docker-completion]
inline = 'on_demand_completion "docker"'

[plugins.gh-completion]
inline = 'on_demand_completion "gh" "gh completion -s zsh"'

[plugins.uv-completion]
inline = 'on_demand_completion "uv" "uv generate-shell-completion zsh"'

[plugins.bun-completion]
inline = 'on_demand_completion "bun" "bun completions $(mktemp -d) | cat"'


